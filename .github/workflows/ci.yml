# CI for the wine-nx Switch port. (The stock .gitlab-ci.yml is upstream
# Wine's and does not exercise any of this fork's code.)
#
# What CI here can NOT cover, by nature: hardware fps and the 8fps GUI
# baseline, [NXWAKE] IPC wake latency, SD-card I/O behavior, the deko3d GPU
# path, and touch/controller input. Those need the hardware checklist in the
# README. What it CAN cover: that every NRO target still compiles (including
# horizon.c's wire-protocol static asserts, which only real Switch builds
# check), and that the SDL2 host-sim dev loop still boots a PE and renders.
name: ci

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: build every Switch NRO target with the same devkitA64 image
  # build-switch.sh uses, pinned by digest so CI can't drift under us.
  # To refresh the pin: check https://hub.docker.com/r/devkitpro/devkita64/tags
  # (or `docker manifest inspect devkitpro/devkita64:latest`), update the
  # digest below, and verify a local ./wine-nx-probe/build-switch.sh run
  # against the new image first. build-switch.sh itself floats :latest.
  switch-nro:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: devkitpro/devkita64@sha256:1fc388c3a0d34bd2045a6dadcb1020e069d5f876a187fd705de14b4440c00282
    steps:
      - uses: actions/checkout@v4

      # Same portlib set build-switch.sh installs (font rendering needs the
      # freetype portlib); --needed makes this a no-op if the image already
      # has them.
      - name: Install Switch portlibs
        run: dkp-pacman -Sy --noconfirm --needed switch-freetype switch-harfbuzz switch-bzip2 switch-libpng

      - name: Configure
        working-directory: wine-nx-probe
        run: cmake -S . -B build-switch -DCMAKE_TOOLCHAIN_FILE=cmake/switch-devkitA64.cmake -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: wine-nx-probe
        run: cmake --build build-switch -j"$(nproc)"

      - name: Check NRO outputs
        working-directory: wine-nx-probe/build-switch
        run: |
          ls -la *.nro
          test -f wine-nx-probe.nro
          test -f wine-nx-runtime.nro
          test -f wine-nx-runtime-deko3d.nro

      - name: Upload NROs
        uses: actions/upload-artifact@v4
        with:
          name: switch-nros
          path: wine-nx-probe/build-switch/*.nro
          retention-days: 7

  # Job 2: build the SDL2 host-sim (full wine build: unix side + aarch64 PE
  # DLLs) and run the self-checking smoke -- run-host-sim.sh exits nonzero
  # unless a PE actually loads and renders through the host-sim surface.
  # Needs an arm64 runner: the container installs the aarch64 llvm-mingw
  # toolchain and the wine build is aarch64-native.
  #
  # continue-on-error until the first green run on GitHub infrastructure;
  # flip it to a required gate after that.
  host-sim:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 240
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # The wine build tree is large but incremental: cache it so re-runs
      # only rebuild what changed instead of the whole tree.
      - name: Cache host-sim build tree
        uses: actions/cache@v4
        with:
          path: wine-nx-probe/build-host-sim-linux
          key: host-sim-build-${{ runner.arch }}-${{ hashFiles('configure.ac', 'wine-nx-probe/docker-host-sim/Dockerfile') }}
          restore-keys: |
            host-sim-build-${{ runner.arch }}-

      - name: Build host-sim image
        run: docker build -t wine-nx-host-sim:latest wine-nx-probe/docker-host-sim

      - name: Run host-sim smoke
        run: |
          docker run --rm -v "$PWD:/work" -w /work \
            wine-nx-host-sim:latest \
            ./wine-nx-probe/docker-host-sim/run-host-sim.sh

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host-sim-screenshot
          path: wine-nx-probe/docker-host-sim/host-sim-screenshot.png
          if-no-files-found: ignore
          retention-days: 7
